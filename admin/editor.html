<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Viziblezone · Site Admin</title>
<link href="https://fonts.googleapis.com/css2?family=Archivo:wght@400;500;700;900&family=IBM+Plex+Mono:wght@400;500&display=swap" rel="stylesheet">
<script src="https://cdnjs.cloudflare.com/ajax/libs/mustache.js/4.2.0/mustache.min.js"></script>
<style>
:root{--ink:#0B0B0C;--panel:#141416;--panel2:#1B1B1E;--line:#2A2A2E;--mustard:#E0A526;--paper:#FCFBF7;--muted:#9A9AA0;--ok:#4CAF7D;--err:#E05B4B}
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:'Archivo',sans-serif;background:var(--ink);color:var(--paper);font-size:15px;line-height:1.55}
.top{position:sticky;top:0;z-index:20;background:rgba(11,11,12,.95);backdrop-filter:blur(8px);border-bottom:1px solid var(--line);padding:12px 20px;display:flex;align-items:center;gap:12px;flex-wrap:wrap}
.brand{font-weight:900;font-size:18px}
.brand b{color:var(--mustard)}
.top .sp{flex:1}
button{font-family:'Archivo',sans-serif;font-size:13.5px;font-weight:700;cursor:pointer;border:2px solid var(--mustard);background:transparent;color:var(--mustard);padding:8px 16px;transition:.15s}
button:hover{background:var(--mustard);color:var(--ink)}
button.primary{background:var(--mustard);color:var(--ink)}
button.primary:hover{background:transparent;color:var(--mustard)}
button.small{padding:3px 10px;font-size:12px;border-width:1px}
button.ghost{border-color:var(--line);color:var(--muted)}
button.ghost:hover{border-color:var(--mustard);color:var(--mustard);background:transparent}
button:disabled{opacity:.35;cursor:not-allowed}
.badge{font-family:'IBM Plex Mono',monospace;font-size:11px;border:1px solid var(--line);color:var(--muted);padding:3px 8px}
.badge.dirty{border-color:var(--mustard);color:var(--mustard)}
.layout{display:grid;grid-template-columns:230px 500px 1fr;min-height:calc(100vh - 59px)}
@media(max-width:1180px){.layout{grid-template-columns:230px 1fr}.pv{display:none}}
@media(max-width:760px){.layout{grid-template-columns:1fr}.tree{border:0;border-bottom:1px solid var(--line);max-height:none}}
.tree{border-right:1px solid var(--line);padding:16px 0;background:var(--panel)}
.tree h5{font-family:'IBM Plex Mono',monospace;font-size:10.5px;letter-spacing:.14em;color:var(--muted);padding:12px 18px 6px}
.tree a{display:block;padding:9px 18px;color:var(--paper);text-decoration:none;font-size:14px;border-left:3px solid transparent}
.tree a:hover{background:var(--panel2)}
.tree a.on{border-left-color:var(--mustard);background:var(--panel2);color:var(--mustard)}
.tree a .dot{color:var(--mustard);font-weight:900;margin-right:6px;display:none}
.tree a.changed .dot{display:inline}
.form{border-right:1px solid var(--line);overflow-y:auto;max-height:calc(100vh - 59px);padding:20px 22px 80px}
.card{background:var(--panel);border:1px solid var(--line);padding:16px;margin-bottom:16px}
.card h3{font-size:14.5px;font-weight:700;color:var(--mustard);margin-bottom:10px;display:flex;align-items:center;gap:8px}
.card h3::before{content:"";width:14px;height:3px;background:var(--mustard)}
label{display:block;font-size:12.5px;color:var(--muted);margin:14px 0 5px}
input[type=text],input[type=password],textarea{width:100%;font-family:'Archivo',sans-serif;font-size:14px;background:var(--ink);border:1px solid var(--line);color:var(--paper);padding:9px 11px;direction:ltr;text-align:left}
textarea{min-height:60px;resize:vertical;line-height:1.5}
input:focus,textarea:focus{outline:none;border-color:var(--mustard)}
.row2{display:grid;grid-template-columns:1fr 1fr;gap:10px}
.hint{font-size:11.5px;color:var(--muted);margin-top:5px}
.hint.warn{color:var(--mustard)}
.list-item{border:1px solid var(--line);background:var(--panel2);padding:4px 14px 14px;margin-top:10px;position:relative}
.li-bar{display:flex;justify-content:flex-end;gap:6px;padding-top:8px}
.li-bar .n{font-family:'IBM Plex Mono',monospace;font-size:11px;color:var(--muted);margin-inline-end:auto;align-self:center}
.imgfield{display:flex;gap:10px;align-items:center;flex-wrap:wrap}
.imgfield img{width:56px;height:56px;object-fit:cover;border:1px solid var(--line)}
.status{position:fixed;bottom:0;right:0;left:0;z-index:30;background:var(--panel);border-top:1px solid var(--line);padding:8px 20px;font-family:'IBM Plex Mono',monospace;font-size:12.5px;color:var(--muted)}
.status.ok{color:var(--ok)}.status.err{color:var(--err)}
.pv{background:#26262a;display:flex;flex-direction:column}
.pv-bar{padding:8px 14px;font-size:12.5px;color:var(--muted);border-bottom:1px solid var(--line);background:var(--panel);display:flex;gap:10px;align-items:center}
iframe{flex:1;border:0;width:100%;background:#fff}
.empty{padding:40px;color:var(--muted);text-align:center}
</style>
</head>
<body>

<div class="top">
  <span class="brand">Vizible<b>zone</b> · Site Admin</span>
  <span class="badge" id="dirtyBadge">No changes</span>
  <span class="sp"></span>
  <button id="btnLoad">Load from GitHub</button>
  <button id="btnBackup">Download backup</button>
  <button class="primary" id="btnPublish" disabled>Publish changes</button>
</div>

<div class="layout">
  <aside class="tree" id="tree"></aside>

  <main class="form" id="form">
    <div class="card">
      <h3>GitHub connection</h3>
      <div class="row2">
        <div><label>Owner</label><input type="text" id="cfgOwner" placeholder="github-username"></div>
        <div><label>Repository</label><input type="text" id="cfgRepo" value="viziblezone-site"></div>
      </div>
      <div class="row2">
        <div><label>Branch</label><input type="text" id="cfgBranch" value="main"></div>
        <div><label>Token (fine-grained, Contents only)</label><input type="password" id="cfgToken" placeholder="github_pat_..."></div>
      </div>
      <p class="hint">Stored in this browser only (localStorage). The token never enters the code or the repository.</p>
    </div>
    <div class="empty">Click "Load from GitHub" to begin.</div>
  </main>

  <aside class="pv">
    <div class="pv-bar"><span>Preview</span><button class="small ghost" id="btnRefreshPv">Refresh</button><button class="small ghost" id="btnPvTab">Open in tab</button></div>
    <iframe id="preview" title="Preview"></iframe>
  </aside>
</div>

<div class="status" id="status">Ready. Publishing triggers an automatic build on GitHub Actions; the site updates within 1-2 minutes.</div>
<input type="file" id="imgPick" accept="image/*" style="display:none">

<script src="schema.js"></script>
<script>
(function(){
"use strict";
const $=id=>document.getElementById(id);
const status=(m,c)=>{const s=$("status");s.textContent=m;s.className="status"+(c?" "+c:"");};
const FILES=Object.keys(CMS_SCHEMA);
const store={};      // path -> {data, sha, dirty}
let templates={};    // name -> mustache source (incl. base) + css
let current=null;    // current file path
let pendingImgField=null;

/* ---- config ---- */
["Owner","Repo","Branch","Token"].forEach(k=>{
  const el=$("cfg"+k), saved=localStorage.getItem("vzcms_"+k);
  if(saved)el.value=saved;
  el.addEventListener("change",()=>localStorage.setItem("vzcms_"+k,el.value.trim()));
});
const cfg=()=>({owner:$("cfgOwner").value.trim(),repo:$("cfgRepo").value.trim(),branch:$("cfgBranch").value.trim()||"main",token:$("cfgToken").value.trim()});
const gh=path=>"https://api.github.com/repos/"+cfg().owner+"/"+cfg().repo+"/contents/"+path;
const hdr=()=>({"Authorization":"Bearer "+cfg().token,"Accept":"application/vnd.github+json","X-GitHub-Api-Version":"2022-11-28"});

/* ---- utf8/base64 ---- */
function b64d(b){const bin=atob(b.replace(/\s/g,""));const u=new Uint8Array(bin.length);for(let i=0;i<bin.length;i++)u[i]=bin.charCodeAt(i);return new TextDecoder().decode(u);}
function b64e(s){const u=new TextEncoder().encode(s);let bin="";for(let i=0;i<u.length;i+=0x8000)bin+=String.fromCharCode.apply(null,u.subarray(i,i+0x8000));return btoa(bin);}

/* ---- path get/set (dot notation; list indices handled by UI) ---- */
function getPath(obj,path){if(path==="")return obj;return path.split(".").reduce((o,k)=>o==null?o:o[k],obj);}
function setPath(obj,path,val){const ks=path.split(".");let o=obj;for(let i=0;i<ks.length-1;i++){if(o[ks[i]]==null)o[ks[i]]={};o=o[ks[i]];}o[ks[ks.length-1]]=val;}

/* ---- dirty tracking ---- */
function anyDirty(){return FILES.some(f=>store[f]&&store[f].dirty);}
function refreshBadges(){
  $("dirtyBadge").textContent=anyDirty()?"Unpublished changes":"No changes";
  $("dirtyBadge").className="badge"+(anyDirty()?" dirty":"");
  $("btnPublish").disabled=!anyDirty();
  document.querySelectorAll("#tree a[data-f]").forEach(a=>a.classList.toggle("changed",!!(store[a.dataset.f]&&store[a.dataset.f].dirty)));
  saveDraft();
}
function markDirty(){if(current)store[current].dirty=true;refreshBadges();schedulePv();}

/* ---- draft autosave ---- */
function saveDraft(){
  const d={};FILES.forEach(f=>{if(store[f]&&store[f].dirty)d[f]=store[f].data;});
  if(Object.keys(d).length)localStorage.setItem("vzcms_draft",JSON.stringify(d));
  else localStorage.removeItem("vzcms_draft");
}
function offerDraft(){
  const raw=localStorage.getItem("vzcms_draft");
  if(!raw)return;
  if(confirm("An unpublished draft from a previous session was found. Restore it?")){
    try{const d=JSON.parse(raw);Object.keys(d).forEach(f=>{if(store[f]){store[f].data=d[f];store[f].dirty=true;}});status("Draft restored. Remember to publish.","ok");}
    catch(e){}
  }else localStorage.removeItem("vzcms_draft");
  refreshBadges();
}

/* ---- sidebar ---- */
function buildTree(){
  const t=$("tree");t.innerHTML="<h5>SITE PAGES</h5>";
  FILES.forEach(f=>{
    const a=document.createElement("a");
    a.href="#";a.dataset.f=f;a.innerHTML='<span class="dot">●</span>'+CMS_SCHEMA[f].label;
    a.onclick=e=>{e.preventDefault();openFile(f);};
    t.appendChild(a);
  });
}

/* ---- form rendering ---- */
function fieldInput(type,value){
  const el=document.createElement(type==="text"||type==="url"?"input":"textarea");
  if(el.tagName==="INPUT")el.type="text";
  el.value=value==null?"":value;
  return el;
}
function renderField(holder,f,basePath,data){
  const path=(basePath?basePath+".":"")+f.key;
  const cleanPath=f.key===""?basePath:path;
  if(f.type==="list"){
    const card=document.createElement("div");card.className="card";
    card.innerHTML="<h3>"+f.label+"</h3>";
    const arr=getPath(data,cleanPath)||[];
    arr.forEach((item,idx)=>{
      const li=document.createElement("div");li.className="list-item";
      const bar=document.createElement("div");bar.className="li-bar";
      bar.innerHTML='<span class="n">#'+(idx+1)+'</span>';
      const mk=(txt,fn,dis)=>{const b=document.createElement("button");b.className="small ghost";b.textContent=txt;b.disabled=!!dis;b.onclick=fn;bar.appendChild(b);};
      mk("▲",()=>{[arr[idx-1],arr[idx]]=[arr[idx],arr[idx-1]];markDirty();openFile(current,window.scrollTarget);},idx===0);
      mk("▼",()=>{[arr[idx+1],arr[idx]]=[arr[idx],arr[idx+1]];markDirty();openFile(current);},idx===arr.length-1);
      mk("Delete",()=>{if(confirm("Delete this item?")){arr.splice(idx,1);markDirty();openFile(current);}});
      li.appendChild(bar);
      f.item.forEach(sf=>{
        if(sf.key===""){ /* array of strings */
          const lab=document.createElement("label");lab.textContent=sf.label;li.appendChild(lab);
          const inp=fieldInput(sf.type,item);
          inp.addEventListener("input",()=>{arr[idx]=inp.value;markDirty();});
          li.appendChild(inp);
        }else{
          renderScalar(li,sf,item,(v)=>{item[sf.key]=v;});
        }
      });
      card.appendChild(li);
    });
    const add=document.createElement("button");add.className="small";add.style.marginTop="12px";add.textContent="+ Add item";
    add.onclick=()=>{
      const blank=f.item.length===1&&f.item[0].key===""?"":Object.fromEntries(f.item.map(sf=>[sf.key,""]));
      arr.push(blank);
      const parent=getPath(data,cleanPath);
      if(!parent)setPath(data,cleanPath,arr);
      markDirty();openFile(current);
    };
    card.appendChild(add);
    holder.appendChild(card);
  }else{
    renderScalar(holder,{...f,key:cleanPath},data,(v)=>setPath(data,cleanPath,v),true);
  }
}
function renderScalar(holder,f,obj,setter,topLevel){
  const lab=document.createElement("label");lab.textContent=f.label;holder.appendChild(lab);
  if(f.type==="image"){
    const box=document.createElement("div");box.className="imgfield";
    const img=document.createElement("img");
    const val=topLevel?getPath(obj,f.key):obj[f.key];
    img.src=val?rawUrl(val):"";img.style.display=val?"block":"none";
    const btn=document.createElement("button");btn.className="small";btn.textContent=val?"Replace image":"Upload image";
    const rm=document.createElement("button");rm.className="small ghost";rm.textContent="Remove";rm.style.display=val?"inline-block":"none";
    btn.onclick=()=>{pendingImgField={setter,img,btn,rm};$("imgPick").click();};
    rm.onclick=()=>{setter("");img.style.display="none";rm.style.display="none";btn.textContent="Upload image";markDirty();};
    box.appendChild(img);box.appendChild(btn);box.appendChild(rm);holder.appendChild(box);
    return;
  }
  const val=topLevel?getPath(obj,f.key):obj[f.key];
  const inp=fieldInput(f.type,val);
  inp.addEventListener("input",()=>{setter(inp.value);markDirty();});
  holder.appendChild(inp);
  if(f.type==="html"){
    const h=document.createElement("div");h.className="hint warn";
    h.textContent='Formatting field: <br> is a line break, <span class="hl">text</span> paints it mustard. Do not delete the tags by mistake.';
    holder.appendChild(h);
  }
}
function openFile(f){
  current=f;
  document.querySelectorAll("#tree a").forEach(a=>a.classList.toggle("on",a.dataset.f===f));
  const form=$("form");
  form.querySelectorAll(".gen").forEach(n=>n.remove());
  form.querySelector(".empty")?.remove();
  const holder=document.createElement("div");holder.className="gen";
  const head=document.createElement("div");head.className="card";
  head.innerHTML="<h3>"+CMS_SCHEMA[f].label+"</h3><p class='hint'>"+f+"</p>";
  holder.appendChild(head);
  CMS_SCHEMA[f].fields.forEach(fd=>renderField(holder,fd,"",store[f].data));
  form.appendChild(holder);
  schedulePv();
}

/* ---- GitHub load ---- */
async function ghGet(path){
  const r=await fetch(gh(path)+"?ref="+encodeURIComponent(cfg().branch),{headers:hdr()});
  if(!r.ok)throw new Error(path+" → "+r.status);
  return r.json();
}
async function loadAll(){
  const c=cfg();
  if(!c.owner||!c.repo||!c.token){status("Fill in owner, repository and token.","err");return;}
  status("Loading content and templates from GitHub...");
  try{
    for(const f of FILES){
      const j=await ghGet(f);
      store[f]={data:JSON.parse(b64d(j.content)),sha:j.sha,dirty:false};
    }
    const tplNames=["base","home","platform","vertical","company","news","contact"];
    for(const t of tplNames){
      const j=await ghGet("templates/"+t+".mustache");
      templates[t]=b64d(j.content);
    }
    templates.css=b64d((await ghGet("assets/css/main.css")).content);
    buildTree();
    offerDraft();
    openFile(FILES[1]); /* home */
    status("Loaded. Select a page to edit.","ok");
  }catch(e){status("Load error: "+e.message,"err");}
}

/* ---- image upload ---- */
$("imgPick").addEventListener("change",async e=>{
  const file=e.target.files[0];e.target.value="";
  if(!file||!pendingImgField)return;
  const name="assets/img/"+Date.now()+"-"+file.name.replace(/[^a-zA-Z0-9.\-_]/g,"");
  status("Uploading image...");
  try{
    const b64=await new Promise((res,rej)=>{const r=new FileReader();r.onload=()=>res(r.result.split(",")[1]);r.onerror=rej;r.readAsDataURL(file);});
    const r=await fetch(gh(name),{method:"PUT",headers:{...hdr(),"Content-Type":"application/json"},
      body:JSON.stringify({message:"Upload image via CMS",content:b64,branch:cfg().branch})});
    if(!r.ok)throw new Error("upload "+r.status);
    pendingImgField.setter(name);
    pendingImgField.img.src=rawUrl(name);pendingImgField.img.style.display="block";
    pendingImgField.rm.style.display="inline-block";pendingImgField.btn.textContent="Replace image";
    markDirty();status("Image uploaded: "+name,"ok");
  }catch(err){status("Upload error: "+err.message,"err");}
  pendingImgField=null;
});
function rawUrl(path){const c=cfg();return "https://raw.githubusercontent.com/"+c.owner+"/"+c.repo+"/"+c.branch+"/"+path;}

/* ---- preview (client-side render, mirrors build.js) ---- */
/* Mirror of build.js ytId(): the videos section shows a YouTube embed when an
   id is present, otherwise the uploaded gif/image. This either/or logic lives
   in BOTH build.js and here — keep them in sync (see docs/NOTES.md). */
function ytId(u){
  const s=String(u||"").trim();
  const m=s.match(/(?:youtu\.be\/|youtube(?:-nocookie)?\.com\/(?:watch\?v=|embed\/|v\/|shorts\/))([A-Za-z0-9_-]{11})/);
  if(m)return m[1];
  return /^[A-Za-z0-9_-]{11}$/.test(s)?s:"";
}
function previewHtml(){
  if(!current||!templates.base)return "";
  const meta=CMS_SCHEMA[current];
  const tplName=meta.template||"home";
  const site=store["content/site.json"].data;
  const verticals=site.verticalSlugs.map(s=>({slug:s,...store["content/verticals/"+s+".json"].data}));
  let page=meta.template?store[current].data:store["content/home.json"].data;
  if(page&&page.videos&&Array.isArray(page.videos.items)){
    page={...page,videos:{...page.videos,items:page.videos.items.map(it=>({...it,videoId:ytId(it.youtubeUrl)}))}};
  }
  const view={site,depth:"",verticals,year:new Date().getFullYear(),page,active:""};
  ["platform","verticals","company","news","contact"].forEach(k=>view["is"+k[0].toUpperCase()+k.slice(1)]=false);
  let html=Mustache.render(templates.base,view,{content:templates[tplName]});
  html=html.replace('<link rel="stylesheet" href="assets/css/main.css">',"<style>"+templates.css+"</style>");
  html=html.replace(/src="assets\/img\//g,'src="'+rawUrl("assets/img/"));
  return html;
}
let pvT=null;
function schedulePv(){clearTimeout(pvT);pvT=setTimeout(()=>{$("preview").srcdoc=previewHtml();},300);}
$("btnRefreshPv").onclick=schedulePv;
$("btnPvTab").onclick=()=>{const w=window.open("about:blank");w.document.write(previewHtml());w.document.close();};

/* ---- publish ---- */
async function publish(){
  const dirtyFiles=FILES.filter(f=>store[f]&&store[f].dirty);
  if(!dirtyFiles.length)return;
  if(!confirm("Publish "+dirtyFiles.length+" files? The site will update within 1-2 minutes."))return;
  $("btnPublish").disabled=true;
  try{
    for(const f of dirtyFiles){
      status("Publishing "+f+"...");
      const body={message:"Content update via CMS: "+f,content:b64e(JSON.stringify(store[f].data,null,2)+"\n"),branch:cfg().branch,sha:store[f].sha};
      const r=await fetch(gh(f),{method:"PUT",headers:{...hdr(),"Content-Type":"application/json"},body:JSON.stringify(body)});
      if(!r.ok){
        if(r.status===409){const j=await ghGet(f);store[f].sha=j.sha;const r2=await fetch(gh(f),{method:"PUT",headers:{...hdr(),"Content-Type":"application/json"},body:JSON.stringify({...body,sha:j.sha})});if(!r2.ok)throw new Error(f+" → "+r2.status);store[f].sha=(await r2.json()).content.sha;}
        else throw new Error(f+" → "+r.status);
      }else{
        store[f].sha=(await r.json()).content.sha;
      }
      store[f].dirty=false;
    }
    localStorage.removeItem("vzcms_draft");
    refreshBadges();
    status("Published. GitHub Actions is building the site; it will go live within 1-2 minutes.","ok");
  }catch(e){status("Publish error: "+e.message,"err");refreshBadges();}
}

/* ---- backup ---- */
function backup(){
  const all={};FILES.forEach(f=>{if(store[f])all[f]=store[f].data;});
  const blob=new Blob([JSON.stringify(all,null,2)],{type:"application/json"});
  const a=document.createElement("a");a.href=URL.createObjectURL(blob);
  a.download="viziblezone-content-"+new Date().toISOString().slice(0,10)+".json";a.click();
  URL.revokeObjectURL(a.href);
  status("Content backup downloaded.","ok");
}

$("btnLoad").onclick=loadAll;
$("btnPublish").onclick=publish;
$("btnBackup").onclick=backup;
buildTree();
window.addEventListener("beforeunload",e=>{if(anyDirty()){e.preventDefault();e.returnValue="";}});
})();
</script>
</body>
</html>
